<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Gravity Sandbox</title>
  <link rel="icon" type="image/png" href="../icon.png?v=1" />
  <link rel="shortcut icon" type="image/png" href="../icon.png?v=1" />
  <link rel="stylesheet" href="../common.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="sidebar">
  <main class="layout">
    <aside class="panel">
      <a class="app__back" href="../index.html">&lt; Back</a>
      <div class="panel__head">
        <h1 class="app__title">Particle Gravity</h1>
        <p class="app__subtitle">Particles fall toward attractors under inverse-square gravity.</p>
      </div>

      <div class="stack">
        <div class="control control--stacked">
          <label class="control__label" for="particles">Particles <span class="control__value" id="particles-out">1500</span></label>
          <input class="control__slider" type="range" id="particles" min="200" max="4000" value="1500" step="100">
        </div>
        <div class="control control--stacked">
          <label class="control__label" for="grav">Gravity</label>
          <input class="control__slider" type="range" id="grav" min="200" max="6000" value="2500" step="100">
        </div>
        <div class="control control--stacked">
          <label class="control__label" for="drag">Drag</label>
          <input class="control__slider" type="range" id="drag" min="0" max="0.05" value="0.005" step="0.001">
        </div>
      </div>

      <div class="stack stack--row">
        <label class="toggle"><input type="checkbox" id="trails" checked><span>Trails</span></label>
        <button id="reset" class="btn btn--ghost" type="button">Clear attractors</button>
        <button id="respawn" class="btn btn--ghost" type="button">Respawn particles</button>
      </div>

      <input type="checkbox" id="show-info" class="info-check" checked>
      <label class="info-toggle" for="show-info">
        <span class="info-toggle__switch"></span>
        <span>Live data</span>
      </label>
      <div class="telemetry">
        <div class="readout">
          <span class="readout__label">Particles</span>
          <span class="readout__value" id="tel-count">0</span>
        </div>
        <div class="readout">
          <span class="readout__label">Attractors +/&minus;</span>
          <span class="readout__value" id="tel-att">0 / 0</span>
        </div>
        <div class="readout">
          <span class="readout__label">Mean speed</span>
          <span class="readout__value" id="tel-speed">0 px/s</span>
        </div>
        <div class="readout">
          <span class="readout__label">Captured</span>
          <span class="readout__value" id="tel-cap">0%</span>
        </div>
      </div>

      <p class="controls__hint">Click to add an attractor &middot; Right-click to add a repeller &middot; Move the cursor to nudge particles</p>
    </aside>

    <section class="viewport">
      <div class="stage">
        <canvas id="c" class="stage__canvas"></canvas>
        <div class="stage__hud">
          <span id="fps" class="hud__stat">-- fps</span>
        </div>
      </div>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
