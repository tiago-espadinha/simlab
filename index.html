<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimLab</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="stylesheet" href="common.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">SimLab - Physics &amp; Visual Sandbox</h1>

      <div class="gallery">
        <a class="card" href="boids/index.html">
          <div class="card__emoji">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <polygon points="10,32 17,30 22,24 24,40" fill="#E5FF52" />
              <polygon points="32,16 39,14 44,8 46,24" fill="#8FFF52" />
              <polygon points="32,48 39,46 44,40 46,56" fill="#52FF6C" />
            </svg>
          </div>
          <h2 class="card__title">Boids</h2>
          <p class="card__desc">
            Simulated flocking behavior of birds or fish.
          </p>
        </a>

        <a class="card" href="particle-gravity/index.html">
          <div class="card__emoji">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <circle cx="32" cy="32" r="5" fill="#6EE7D0" />
              <circle cx="32" cy="10" r="2.5" fill="#B48EFB" />
              <circle cx="32" cy="12" r="2.5" fill="#9762F9" />
              <circle cx="32" cy="14" r="2.5" fill="#752DF7" />
              <circle cx="50" cy="36" r="2.5" fill="#EB8EFB" />

              <circle cx="46" cy="34" r="2.5" fill="#D92DF7" />
              <circle cx="14" cy="46" r="2.5" fill="#8E9EFB" />
              <circle cx="16" cy="44" r="2.5" fill="#6278F9" />
              <circle cx="18" cy="42" r="2.5" fill="#2D4BF7" />
            </svg>
          </div>
          <h2 class="card__title">Particle Gravity</h2>
          <p class="card__desc">
            Drop attractors and watch particles orbit under inverse-square
            gravity.
          </p>
        </a>
      </div>
    </main>
  </body>
</html>
