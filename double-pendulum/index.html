<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double Pendulum</title>
  <link rel="icon" type="image/png" href="../icon.png?v=1" />
  <link rel="shortcut icon" type="image/png" href="../icon.png?v=1" />
  <link rel="stylesheet" href="../common.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="layout">
    <aside class="panel">
      <a class="app__back" href="../index.html">&lt; Back</a>
      <div class="panel__head">
        <h1 class="app__title">Double Pendulum</h1>
        <p class="app__subtitle">Sidebar controls with optional telemetry.</p>
      </div>

      <div class="stack">
        <div class="control control--stacked">
          <label class="control__label" for="m1">Mass 1</label>
          <input class="control__slider" type="range" id="m1" min="5" max="40" value="18" step="1">
        </div>
        <div class="control control--stacked">
          <label class="control__label" for="m2">Mass 2</label>
          <input class="control__slider" type="range" id="m2" min="5" max="40" value="18" step="1">
        </div>
        <div class="control control--stacked">
          <label class="control__label" for="gravity">Gravity</label>
          <input class="control__slider" type="range" id="gravity" min="0.2" max="3" value="1" step="0.1">
        </div>
        <div class="control control--stacked">
          <label class="control__label" for="count">Copies <span class="control__value" id="count-out">1</span></label>
          <input class="control__slider" type="range" id="count" min="1" max="12" value="1" step="1">
        </div>
      </div>

      <div class="stack stack--row">
        <label class="toggle"><input type="checkbox" id="trail" checked><span>Trail</span></label>
        <button id="pause" class="btn" type="button">Pause</button>
        <button id="reset" class="btn btn--ghost" type="button">Reset</button>
      </div>

      <!-- CSS-only toggle: the checkbox drives both the switch visual and the
           visibility of the telemetry list via sibling selectors. -->
      <input type="checkbox" id="show-info" class="info-check" checked>
      <label class="info-toggle" for="show-info">
        <span class="info-toggle__switch"></span>
        <span>Live data</span>
      </label>

      <div class="telemetry">
        <div class="readout">
          <span class="readout__label">Angle θ₁</span>
          <span class="readout__value" id="tel-a1">0.0°</span>
        </div>
        <div class="readout">
          <span class="readout__label">Angle θ₂</span>
          <span class="readout__value" id="tel-a2">0.0°</span>
        </div>
        <div class="readout">
          <span class="readout__label">Tip speed</span>
          <span class="readout__value" id="tel-vel">0.00 rad/s</span>
        </div>
        <div class="readout">
          <span class="readout__label">Chaos spread</span>
          <span class="readout__value" id="tel-spread">0.0°</span>
        </div>
      </div>

      <p class="controls__hint">Click the canvas to grab and reposition the pendulum.</p>
    </aside>

    <section class="viewport">
      <div class="stage">
        <canvas id="c" class="stage__canvas"></canvas>
        <div class="stage__hud">
          <span id="fps" class="hud__stat">-- fps</span>
        </div>
      </div>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
